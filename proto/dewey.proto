syntax = "proto3";

package dewey;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

service ExecutionService {
  rpc Health(google.protobuf.Empty) returns (google.protobuf.Struct);
  rpc GetMetrics(google.protobuf.Empty) returns (google.protobuf.Struct);
  rpc ExecuteMandate(google.protobuf.Struct) returns (google.protobuf.Struct);
}
